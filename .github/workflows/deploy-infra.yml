name: Deploy Infrastructure

on:
  push:
    branches:
      - main

# Prevent concurrent CDK deploys (CloudFormation doesn't support parallel updates)
concurrency:
  group: cdk-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::097853039310:role/github-actions-infra-role
          aws-region: ap-south-2

      - name: Synthesize CDK templates
        run: npx cdk synth

      - name: Show diff (what will change)
        run: npx cdk diff --all || true

      - name: Deploy all stacks
        run: npx cdk deploy --all --require-approval never
